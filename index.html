let actx=null, master=null, muted=false;
function audio(){
  if(!actx){
    const AC = window.AudioContext||window.webkitAudioContext;
    actx = new AC();
    master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function beep(freq, dur=0.1, type='sine', gain=0.12, slideTo=0, delay=0){
  if(muted||!actx) return;
  const t0 = actx.currentTime + delay;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+dur+0.05);
}
function noiseSound(dur=1, freq=400, gain=0.2, type='lowpass'){
  if(muted||!actx) return;
  const t0 = actx.currentTime;
  const len = Math.floor(actx.sampleRate*dur);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(gain, t0+dur*0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t0);
}

/* ============================================================
   지형 — 땅 · 강 · 산
============================================================ */
const groundMat = new THREE.MeshStandardMaterial({color:'#5aa84f', roughness:1, metalness:0});
const groundGeo = new THREE.PlaneGeometry(900,900,72,72);
function riverX(z){ return Math.sin(z*0.012)*70; }
const RIVER_W = 24;
{ // 외곽에 완만한 언덕 노이즈 (도시·강 지역은 평평하게)
  const pos = groundGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), wz = -pos.getY(i);
    const r = Math.hypot(x, wz);
    if(r>175 && Math.abs(x - riverX(wz)) > RIVER_W/2 + 24){
      const f = Math.min(1,(r-175)/90);
      pos.setZ(i, (Math.sin(x*0.045)+Math.cos(wz*0.05)+Math.sin((x+wz)*0.021))*1.4*f);
    }
  }
  groundGeo.computeVertexNormals();
}
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
worldRoot.add(ground);

/* 실시간 반사 물 (Three.js Water 애드온) */
const waterNormals = new THREE.TextureLoader().load(
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/waternormals.jpg',
  t=>{ t.wrapS = t.wrapT = THREE.RepeatWrapping; });
function makeWater(geo, color){
  const w = new Water(geo, {
    textureWidth: 512, textureHeight: 512,
    waterNormals,
    sunDirection: new THREE.Vector3(0.3,1,0.2),
    sunColor: 0xffffff, waterColor: color,
    distortionScale: 2.2, fog: true,
  });
  return w;
}
let riverWater;
{
  const pts = [];
  for(let z=-450; z<=450; z+=10){
    const x = riverX(z);
    const dz = 10, dx = riverX(z+dz)-x;
    const len = Math.hypot(dx,dz);
    const nx = dz/len, nz = -dx/len; // 법선
    pts.push([x-nx*RIVER_W/2, z-nz*RIVER_W/2, x+nx*RIVER_W/2, z+nz*RIVER_W/2]);
  }
  // Water 애드온은 XY 평면(+Z 법선) 지오메트리를 기대 → XY로 만들고 메시를 눕힌다
  const verts=[], idx=[];
  pts.forEach((p,i)=>{ verts.push(p[0],-p[1],0, p[2],-p[3],0);
    if(i>0){ const a=(i-1)*2; idx.push(a,a+2,a+1, a+1,a+2,a+3); } });
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
  g.setIndex(idx); g.computeVertexNormals();
  riverWater = makeWater(g, 0x1f6fc4);
  riverWater.rotation.x = -Math.PI/2;
  riverWater.position.y = 0.15;
  worldRoot.add(riverWater);
}
function nearRiver(x,z,margin=16){ return Math.abs(x - riverX(z)) < RIVER_W/2 + margin; }

}

/* 건물 외벽 텍스처 — 창문 그리드, 밤에는 emissiveMap 으로 불이 켜진다 */
const facadeCache = {};
const nightFacadeMats = [];
function facadeMat(base, rows, variant=0, opts={}){
  const key = base+'_'+rows+'_'+variant;
  if(facadeCache[key]) return facadeCache[key];
  const cols = 4;
  const cv = document.createElement('canvas'); cv.width=128; cv.height=32*rows;
  const x = cv.getContext('2d');
  const em = document.createElement('canvas'); em.width=cv.width; em.height=cv.height;
  const xe = em.getContext('2d');
  x.fillStyle = base; x.fillRect(0,0,cv.width,cv.height);
  // 미묘한 층 음영
  x.fillStyle = 'rgba(0,0,0,0.07)';
  for(let r=0;r<rows;r++) if(r%2) x.fillRect(0,r*32,cv.width,32);
  xe.fillStyle = '#000'; xe.fillRect(0,0,cv.width,cv.height);
  const ww = cv.width/cols, wh = 32;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const wx = c*ww+ww*0.22, wy = r*wh+wh*0.22, w2 = ww*0.56, h2 = wh*0.5;
    x.fillStyle = opts.glass ? '#bfe0f2' : '#1a2531';
    x.fillRect(wx,wy,w2,h2);
    x.strokeStyle = 'rgba(255,255,255,0.25)'; x.strokeRect(wx,wy,w2,h2);
    if(Math.random()<0.55){
      xe.fillStyle = ['#ffd977','#ffe8b0','#cfe8ff'][Math.floor(Math.random()*3)];
      xe.fillRect(wx,wy,w2,h2);
    }
  }
  const mat = new THREE.MeshStandardMaterial({
    map: new THREE.CanvasTexture(cv),
    emissiveMap: new THREE.CanvasTexture(em),
    emissive: new THREE.Color('#ffffff'), emissiveIntensity: 0,
    roughness: opts.glass?0.25:0.85, metalness: opts.glass?0.5:0.05,
  });
  facadeCache[key] = mat; nightFacadeMats.push(mat);
  return mat;
}
function facadeBox(w,h,d,base,variant=0,opts={}){
  const rows = Math.max(2, Math.round(h*0.9));
  const side = facadeMat(base, rows, variant, opts);
  const roof = new THREE.MeshLambertMaterial({color: new THREE.Color(base).multiplyScalar(0.55)});
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), [side,side,roof,roof,side,side]);
  m.castShadow = true; return m;
}

function buildCity(era){
  cityRoot.clear();
  buildings = []; spinners = []; nightMeshes = []; smokeStacks = [];
  const put = (s, name)=>{
    const {g, kind} = builders[name](s);
    g.position.set(s.x, 0, s.z);
    g.rotation.y = Math.random()*Math.PI*2;
    cityRoot.add(g);
    if(kind){
      const b = {group:g, x:s.x, z:s.z, kind, baseY:0};
      buildings.push(b);
      g.traverse(o=>{ o.userData.building = b; });
    }
  };
  slots.forEach(s=>{
    const ring = Math.max(Math.abs(Math.round(s.x/38)), Math.abs(Math.round(s.z/38)));
    switch(era){
      case 0: if(s.i%3===0) put(s,'rock'); break;
      case 1: if(s.i%2===0) put(s,'teepee'); break;
      case 2: put(s, (ring>=2 && s.i%3===0) ? 'farm' : 'mudHouse'); break;
      case 3:
        if(s.i===Math.floor(slots.length/2)) put(s,'castle');
        else if(s.i%7===0) put(s,'windmill');
        else if(ring>=2 && s.i%4===0) put(s,'farm');
        else put(s,'medieval');
        break;
      case 4: put(s, s.i%4===0 ? 'factory' : 'brickHouse'); break;
      case 5: put(s, s.i%5===0 ? 'factory' : (ring<=1 ? 'modern':'brickHouse')); break;
      case 6: put(s, ring<=1 ? 'glassTower' : 'modern'); break;
      case 7: case 8: put(s, ring<=1 ? 'future' : (s.i%2===0?'glassTower':'modern')); break;
    }
  });
  if(era>=5){ // 가로등
    [-57,-19,19,57].forEach(px=>[-57,-19,19,57].forEach(pz=>{
      const {g} = builders.streetlight({});
      g.position.set(px+4.5, 0, pz+4.5); cityRoot.add(g);
    }));
  }
  roadsRoot.visible = era>=5;
  padRoot.visible = era>=8;
  document.getElementById('rocketBtn').style.display = (era>=8 && state.view==='surface') ? 'inline-block':'none';
  buildCars(era>=5 ? (era>=6?14:8) : 0);
  buildDrones(era>=7 ? 10 : 0);
  buildPeople(era);
  buildAnimals(era);
}

function buildPeople(era){
  peopleRoot.clear(); people.length = 0;
  const jobs = JOBS[era]; const n = ERAS[era].pop;
  if(!jobs.length || !n) return;
  const homes = buildings.filter(b=>b.kind==='home');
  const works = buildings.filter(b=>b.kind==='work');
  if(!homes.length) return;
  // 가족 단위로 배치 (한 집에 2~4명)
  let hi = 0;
  const homeMembers = new Map();
  for(let i=0;i<n;i++){
    const jobIdx = i%jobs.length;
    const home = homes[hi%homes.length];
    if((i+1)%(2+Math.floor(Math.random()*3))===0) hi++;
    const mesh = makePersonMesh(jobIdx);
    const name = SURNAMES[Math.floor(Math.random()*SURNAMES.length)]+GIVEN[Math.floor(Math.random()*GIVEN.length)];
    const work = works.length ? works[Math.floor(Math.random()*works.length)] : null;
    const p = {
      mesh, name, job: jobs[jobIdx],
      home, work,
      x: home.x+(Math.random()-0.5)*8, z: home.z+(Math.random()-0.5)*8,
      tx:0, tz:0, speed: 2+Math.random(),
      wanderT: Math.random()*4, greetCd: 0, pauseT: 0, panic: false,
      phase: Math.random()*Math.PI*2, state:'집',
    };
    p.tx = p.x; p.tz = p.z;
    mesh.position.set(p.x,0,p.z);
    mesh.traverse(o=>{ o.userData.person = p; });
    peopleRoot.add(mesh); people.push(p);
    if(!homeMembers.has(home)) homeMembers.set(home,[]);
    homeMembers.get(home).push(p);
  }
  people.forEach(p=>{ p.family = (homeMembers.get(p.home)||[]).filter(q=>q!==p); });
}

  x.fillStyle = base; x.fillRect(0,0,256,128);
  for(let i=0;i<blobN;i++){

}

function applyCamera(){
  const free = (state.view==='space' || state.view==='galaxy');
  cam.phi = Math.max(free?-1.4:0.08, Math.min(1.53, cam.phi));
  cam.dist = Math.max(cam.minDist, Math.min(cam.maxDist, cam.dist));
  if(state.view==='surface'){
    cam.target.x = Math.max(-300, Math.min(300, cam.target.x));
    cam.target.z = Math.max(-300, Math.min(300, cam.target.z));
  }
  if(!free) cam.target.y = Math.max(0, cam.target.y);
  const cp = Math.cos(cam.phi), sp = Math.sin(cam.phi);
  camera.position.set(
    cam.target.x + cam.dist*cp*Math.sin(cam.theta),
    cam.target.y + cam.dist*sp + 0.5,
    cam.target.z + cam.dist*cp*Math.cos(cam.theta));
  camera.lookAt(cam.target.x, cam.target.y+0.5, cam.target.z);
}
let dragBtn = -1, lastX=0, lastY=0, downX=0, downY=0;
canvas.addEventListener('pointerdown', e=>{
  audio();
  dragBtn = e.button; lastX=downX=e.clientX; lastY=downY=e.clientY;
  try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
});
canvas.addEventListener('pointermove', e=>{
  if(dragBtn<0) return;
  const dx = e.clientX-lastX, dy = e.clientY-lastY;
  lastX = e.clientX; lastY = e.clientY;
  if(dragBtn===1){            // 휠(가운데) 드래그: 각도
    cam.theta -= dx*0.005;
    cam.phi   += dy*0.005;
  } else if(dragBtn===0){     // 좌드래그: 이동 (좌우는 반전) / 우주에서는 회전
    if(state.view==='space' || state.view==='galaxy'){
      cam.theta += dx*0.005; cam.phi += dy*0.005;
      return;
    }
    const k = cam.dist*0.0016;
    const st = Math.sin(cam.theta), ct = Math.cos(cam.theta);
    cam.target.x -= (-dx*ct - dy*st)*k;
    cam.target.z -= (dx*st - dy*ct)*k;
  } else if(dragBtn===2){     // 우드래그: 각도 (보조)
    cam.theta -= dx*0.005; cam.phi += dy*0.005;
  }
});
canvas.addEventListener('pointerup', e=>{
  const moved = Math.hypot(e.clientX-downX, e.clientY-downY);
  if(dragBtn===0 && moved<6) pickPerson(e);
  dragBtn = -1;
});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  cam.dist *= 1 + Math.sign(e.deltaY)*0.11;
  cam.dist = Math.max(cam.minDist, Math.min(cam.maxDist*1.02, cam.dist));
}, {passive:false});

const debris = [];
function burst(x,y,z,colors=['#8a8f7e','#6b5a48','#b5654a']){
  for(let i=0;i<14;i++){
    const s = 0.3+Math.random()*0.9;
    const m = new THREE.Mesh(new THREE.BoxGeometry(s,s,s),
      new THREE.MeshLambertMaterial({color:colors[i%colors.length]}));
    m.position.set(x,y,z);
    worldRoot.add(m);
    debris.push({m, vx:(Math.random()-0.5)*16, vy:6+Math.random()*12, vz:(Math.random()-0.5)*16,
      rx:(Math.random()-0.5)*10, rz:(Math.random()-0.5)*10, life:1.8});
  }
}
function smashBuilding(b){
  if(b.collapsing) return;
  b.collapsing = true; b.collapseT = 0;
  b.fallDir = Math.random()*Math.PI*2;
  burst(b.x, 2.5, b.z);
  noiseSound(0.8, 200, 0.32);
  beep(120, 0.4, 'sawtooth', 0.12, 50);
  people.forEach(p=>{ if(Math.hypot(p.x-b.x,p.z-b.z)<18){ p.panic=true; p.panicT=6; } });
}
function flingPerson(p){
  p.fly = {y:0.5, vy:15+Math.random()*8, vx:(Math.random()-0.5)*22, vz:(Math.random()-0.5)*22};
  showBubble(p.x, 3.5, p.z, '으아아악~!');
  beep(700, 0.5, 'sawtooth', 0.1, 1600);
}

function pickPerson(e){
  const m = new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(m, camera);
  /* 우주: 행성 클릭 → 포커스 */
  if(state.view==='space' && !state.flight){
    const targets = planetMeshes.map(p=>p.mesh); if(moonSphere) targets.push(moonSphere);
    const phits = raycaster.intersectObjects(targets, false);
    if(phits.length){
      focusBody = phits[0].object;
      const def = focusBody.userData.planet;
      cam.dist = Math.max(6, (def?.r||5)*4.5);
      banner((focusBody.userData.isEarth?'🌍 ':focusBody.userData.isMoon?'🌕 ':'🪐 ')+(def?.name||'행성')
        + (focusBody.userData.isEarth?' — 계속 확대하면 착륙!':focusBody.userData.isMoon?' — 계속 확대하면 착륙!':''));
    }
    return;
  }
  if(state.view!=='surface') return;
  /* ✋ 파괴 모드 */
  if(state.destroyMode){
    const hits = raycaster.intersectObjects([cityRoot, peopleRoot], true);
    for(const h of hits){
      const p = h.object.userData.person;
      if(p && !p.fly){ flingPerson(p); return; }
      const b = h.object.userData.building;
      if(b){ smashBuilding(b); return; }
    }
    return;
  }
  const hits = raycaster.intersectObjects(peopleRoot.children, true);
  const panel = document.getElementById('bottomRight');
  if(hits.length && hits[0].object.userData.person){
    const p = hits[0].object.userData.person;
    document.getElementById('infoName').textContent = `👤 ${p.name}`;
    const fam = p.family && p.family.length ? p.family.map(f=>f.name).join(', ') : '(독신 가구)';
    document.getElementById('infoBody').innerHTML =
      `직업: <b>${p.job}</b><br>가족: ${fam}<br>지금: <b>${p.state}</b><br>` +
      `한마디: "${CHATS[Math.floor(Math.random()*CHATS.length)]}"`;
    panel.style.display = 'block';
    showBubble(p.x, 3.2, p.z, GREETS[Math.floor(Math.random()*GREETS.length)]);
    greetSound();
    clearTimeout(panel._t);
    panel._t = setTimeout(()=>panel.style.display='none', 7000);
  } else {
    panel.style.display = 'none';
  }
}

let lastBuiltEra = -1;
function checkEra(){
  state.eraFloat = Math.max(0, Math.min(8.99, state.eraFloat));
  eraSlider.value = state.eraFloat;
  const e = Math.floor(state.eraFloat);
  if(e !== state.era){
    const forward = e > state.era;
    state.era = e;
    if(forward && ERA_EVENTS[e]){
      banner(ERA_EVENTS[e], 5000);
      if(e===1) spawnMeteor();
      beep(520,0.15,'triangle',0.1); beep(660,0.15,'triangle',0.1,0,0.15); beep(880,0.3,'triangle',0.1,0,0.3);
    } else if(!forward){
      banner('⏪ 시간이 거꾸로 흐릅니다 — ' + ERAS[e].name);
      beep(880,0.12,'triangle',0.08,440);
    }
  }
  if(e !== lastBuiltEra){
    lastBuiltEra = e;
    buildCity(e);
    document.getElementById('eraName').textContent = ERAS[e].name;
    document.getElementById('eraYear').textContent = ERAS[e].year;
  }
}

const SKY_KEYS = [
  [0,   '#070b22'], [4.5, '#0d1435'], [6, '#f4976c'], [7.5, '#9ec7e8'],
  [9,   '#87ceeb'], [16,  '#87ceeb'], [18, '#ffb36b'], [19.2,'#e2653a'],
  [20.2,'#2a2050'], [21.5,'#070b22'], [24, '#070b22'],
];
const skyColor = new THREE.Color();
function updateSky(){
  if(state.view!=='surface') return;
  const t = dayTime();
  let a = SKY_KEYS[0], b = SKY_KEYS[SKY_KEYS.length-1];
  for(let i=0;i<SKY_KEYS.length-1;i++){
    if(t>=SKY_KEYS[i][0] && t<=SKY_KEYS[i+1][0]){ a=SKY_KEYS[i]; b=SKY_KEYS[i+1]; break; }
  }
  const f = (t-a[0])/Math.max(0.001, b[0]-a[0]);
  skyColor.set(a[1]).lerp(new THREE.Color(b[1]), f);
  if(!state.onMoon){
    scene.fog.color.copy(skyColor);
    scene.fog.near = 350; scene.fog.far = 1000;
  }
  // 해 위치
  const ang = (t/24)*Math.PI*2 - Math.PI/2;
  const sx = Math.cos(ang)*500, sy = Math.sin(ang)*500;
  if(!state.onMoon){
    sun.position.set(sx, Math.max(sy, -80), 150);
    sunBall.position.set(cam.target.x + Math.cos(ang)*900, Math.sin(ang)*900, cam.target.z+250);
    moonBall.position.set(cam.target.x - Math.cos(ang)*900, -Math.sin(ang)*900, cam.target.z-250);
    const dayness = Math.max(0, Math.sin(ang));
    sun.intensity = 0.25 + dayness*2.0;
    sun.color.set('#ff9a4d').lerp(new THREE.Color('#fff3e0'), Math.min(1, dayness*2.5));
    amb.intensity = 0.15 + dayness*0.3;
    hemi.intensity = 0.12 + dayness*0.5;
    starMat.opacity = Math.max(0, 0.9 - dayness*3);
    renderer.toneMappingExposure = 0.42 + dayness*0.55;
    // 물리 하늘 셰이더에 태양 방향 전달
    skyUni.sunPosition.value.set(Math.cos(ang), Math.sin(ang), 0.28).normalize();
    skyUni.rayleigh.value = 1.2 + Math.max(0, 1-Math.abs(Math.sin(ang))*3)*2.5; // 노을에 붉게
    skyUni.mieCoefficient.value = 0.004 + Math.max(0, 0.35-dayness)*0.02;
    // 물 반사에 태양 방향 전달
    if(riverWater){
      riverWater.material.uniforms.sunDirection.value.copy(sun.position).normalize();
      riverWater.material.uniforms.sunColor.value.copy(sun.color);
    }
    const isNight = dayTime()<6 || dayTime()>19;
    nightMeshes.forEach(w=>{ w.visible = isNight; });
    nightFacadeMats.forEach(m=>{ m.emissiveIntensity = isNight ? 1.15 : 0; });
  }
}

let greetTimer = 0, ambientTimer = 0;
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const gdt = dt * state.speed; // 게임 시간 (음수 가능)
  const t = clock.elapsedTime;

  if(state.view==='surface'){
    state.worldHours += gdt * HOURS_PER_SEC; // 하루 = 50초(1배속)
  }

  if(state.view==='surface' && !state.launching){
    state.eraFloat += gdt / ERA_SECONDS;
  }
  checkEra();
  updateSky();
  applySeasonColors();

  /* 계절 파티클 */
  {
    const si = seasonIdx();
    if(si===3){ particles.visible=true; partMat.color.set('#ffffff'); partMat.size=1.5; }
    else if(si===2){ particles.visible=true; partMat.color.set('#e07b2a'); partMat.size=1.2; }
    else if(si===0){ particles.visible=true; partMat.color.set('#f4a7c3'); partMat.size=1.0; }
    else particles.visible=false;
    snowCapMats.forEach(m=>m.color.set(si===3?'#ffffff':'#e8ecf2'));
    if(particles.visible){
      const arr = partGeo.attributes.position.array;
      const fall = si===3 ? 9 : 4;
      for(let i=0;i<PARTS;i++){
        arr[i*3+1] -= dt*fall*(0.6+((i*7)%10)/10);
        arr[i*3]   += Math.sin(t*1.5+i)*dt*2 + state.wind*dt*20;
        if(arr[i*3+1]<0){ arr[i*3+1]=130; arr[i*3]=(Math.random()-0.5)*500; arr[i*3+2]=(Math.random()-0.5)*500; }
      }
      partGeo.attributes.position.needsUpdate = true;
    }
  }

  /* 바람 */
  if(state.windT>0){ state.windT-=dt; state.wind = Math.min(1, state.wind+dt*1.5); }
  else state.wind = Math.max(0, state.wind-dt*0.7);
  trees.forEach(tr=>{
    tr.rotation.z = state.wind*0.45 + Math.sin(t*2+tr.userData.phase)*0.02*(1+state.wind*10);
    tr.rotation.x = Math.sin(t*2.7+tr.userData.phase)*0.015*(1+state.wind*8);
  });

  /* 지진 */
  let shakeX=0, shakeY=0;
  if(state.quakeT>0){
    state.quakeT -= dt;
    const k = Math.min(1, state.quakeT/2);
    shakeX = (Math.random()-0.5)*k*1.6*Math.min(20,cam.dist)/20;
    shakeY = (Math.random()-0.5)*k*1.2*Math.min(20,cam.dist)/20;
    if(Math.random()<0.06) noiseSound(0.5, 90+Math.random()*80, 0.15);
  }
  buildings.forEach(b=>{
    if(b.collapsing){
      b.collapseT += dt;
      const c = Math.min(1, b.collapseT/1.4);
      b.group.rotation.x = Math.sin(b.fallDir)*c*1.1;
      b.group.rotation.z = Math.cos(b.fallDir)*c*1.1;
      b.group.position.y = -c*1.2;
      if(state.quakeT<=0 && b.collapseT>3){ // 서서히 복구
        b.collapsing=false; b.rebuild=0;
      }
    } else if(b.rebuild!==undefined && b.rebuild<1){
      b.rebuild += dt*0.5;
      const c = 1-Math.min(1,b.rebuild);
      b.group.rotation.x = Math.sin(b.fallDir)*c*1.1;
      b.group.rotation.z = Math.cos(b.fallDir)*c*1.1;
      b.group.position.y = -c*1.2;
    } else if(state.quakeT>0 && !b.collapsing){
      b.group.position.y = (Math.random()-0.5)*0.25;
    } else if(!b.collapsing){
      b.group.position.y = 0;
    }
  });

  /* 홍수 */
  if(state.floodT>0){
    state.floodT -= dt;
    const total=16, elapsed = total-state.floodT;
    let lvl;
    if(elapsed<5) lvl = elapsed/5;          // 차오름
    else if(elapsed<10) lvl = 1;            // 유지
    else lvl = Math.max(0,(total-elapsed)/6); // 빠짐
    state.floodLevel = lvl;
    floodWater.visible = lvl>0.02;
    floodWater.position.y = -3 + lvl*6.2;
    floodMat.opacity = 0.4+lvl*0.35;
    if(Math.random()<0.04) noiseSound(0.8, 700, 0.08);
  } else { floodWater.visible=false; state.floodLevel=0; }

  /* 사람들 */
  const dtDay = dayTime();
  people.forEach(p=>{
    if(p.panic){
      p.panicT -= dt;
      if(p.panicT<=0) p.panic=false;
      if(Math.random()<0.02){ p.tx = p.x+(Math.random()-0.5)*30; p.tz = p.z+(Math.random()-0.5)*30; }
      p.state = '😱 대피 중!';
    } else if(p.pauseT>0){
      p.pauseT -= dt; p.state='인사 중';
    } else {
      // 일과
      let dest;
      if(dtDay>=8 && dtDay<17 && p.work){ dest=p.work; p.state=`${p.job} 일하는 중`; }
      else if(dtDay>=17 && dtDay<21){ dest=null; p.state='산책 중'; }
      else { dest=p.home; p.state = (dtDay>=22||dtDay<6)?'잠자는 중 💤':'집에서 쉬는 중'; }
      p.wanderT -= dt;
      if(p.wanderT<=0){
        p.wanderT = 2.5+Math.random()*4;
        if(dest){ p.tx = dest.x+(Math.random()-0.5)*9; p.tz = dest.z+(Math.random()-0.5)*9; }
        else { p.tx = p.x+(Math.random()-0.5)*22; p.tz = p.z+(Math.random()-0.5)*22; }
      }
    }
    // ✋ 신의 손에 집어던져진 상태
    if(p.fly){
      p.fly.vy -= dt*22;
      p.x += p.fly.vx*dt; p.z += p.fly.vz*dt;
      p.fly.y = Math.max(0, p.fly.y + p.fly.vy*dt);
      p.mesh.position.set(p.x, p.fly.y, p.z);
      p.mesh.rotation.x += dt*9;
      if(p.fly.y<=0 && p.fly.vy<0){
        p.mesh.rotation.x = 0; p.fly = null;
        p.panic = true; p.panicT = 5; p.tx=p.x; p.tz=p.z;
      }
      return;
    }
    const dx = p.tx-p.x, dz = p.tz-p.z, d = Math.hypot(dx,dz);
    const spd = p.panic ? p.speed*2.6 : p.speed;
    const L = p.mesh.userData.limbs;
    if(d>0.4 && p.pauseT<=0){
      p.x += dx/d*spd*dt*(1+state.wind*1.5);
      p.z += dz/d*spd*dt;
      p.mesh.rotation.y = Math.atan2(dx,dz);
      p.mesh.position.y = Math.abs(Math.sin(t*8+p.phase))*0.07;
      if(L){ const s = Math.sin(t*(7+spd)+p.phase)*0.75;
        L.armL.rotation.x = s;  L.armR.rotation.x = -s;
        L.legL.rotation.x = -s; L.legR.rotation.x = s; }
    } else {
      p.mesh.position.y = 0;
      if(L){ L.armL.rotation.x*=0.85; L.armR.rotation.x*=0.85; L.legL.rotation.x*=0.85; L.legR.rotation.x*=0.85; }
    }
    p.mesh.position.x = p.x; p.mesh.position.z = p.z;
    if(p.greetCd>0) p.greetCd -= dt;
  });

  /* 인사 체크 */
  greetTimer -= dt;
  if(greetTimer<=0 && state.view==='surface'){
    greetTimer = 0.7;
    for(let i=0;i<people.length;i++){
      const a = people[i];
      if(a.greetCd>0 || a.panic) continue;
      for(let j=i+1;j<people.length;j++){
        const b = people[j];
        if(b.greetCd>0 || b.panic) continue;
        if(Math.hypot(a.x-b.x, a.z-b.z)<3.5){
          a.greetCd = b.greetCd = 18+Math.random()*15;
          a.pauseT = b.pauseT = 2;
          a.mesh.rotation.y = Math.atan2(b.x-a.x, b.z-a.z);
          b.mesh.rotation.y = Math.atan2(a.x-b.x, a.z-b.z);
          showBubble(a.x, 3.1, a.z, GREETS[Math.floor(Math.random()*GREETS.length)]);
          showBubble(b.x, 3.1, b.z, GREETS[Math.floor(Math.random()*GREETS.length)], 1.8);
          if(cam.dist<130) greetSound();
          break;
        }
      }
    }
  }

  /* 주변 소리 (새/귀뚜라미/수다/공룡) */
  ambientTimer -= dt;
  if(ambientTimer<=0 && state.view==='surface' && actx){
    ambientTimer = 2.5+Math.random()*3;
    const day = dtDay>6 && dtDay<19;
    if(state.era===0){ if(Math.random()<0.4) dinoSound(); else if(day) birdSound(); }
    else if(day){
      if(Math.random()<0.5) birdSound();
      else if(people.length && cam.dist<100){ chatterSound();
        const p = people[Math.floor(Math.random()*people.length)];
        if(Math.random()<0.4) showBubble(p.x,3.1,p.z, CHATS[Math.floor(Math.random()*CHATS.length)]);
      }
    } else cricketSound();
  }

  /* 말풍선 */
  for(let i=bubbles.length-1;i>=0;i--){
    const b = bubbles[i];
    b.life -= dt;
    const s = Math.max(1.6, Math.min(14, cam.dist*0.055));
    b.sp.scale.set(s, s*0.34, 1);
    b.sp.material.opacity = Math.min(1, b.life/0.5);
    b.sp.position.y += dt*0.4;
    if(b.life<=0){ worldRoot.remove(b.sp); b.sp.material.map.dispose(); b.sp.material.dispose(); bubbles.splice(i,1); }
  }

  /* 동물 */
  animals.forEach(a=>{
    a.t -= dt;
    if(a.t<=0){ a.t = 3+Math.random()*6; a.tx = a.x+(Math.random()-0.5)*(a.dino?60:30); a.tz = a.z+(Math.random()-0.5)*(a.dino?60:30); }
    const dx=a.tx-a.x, dz=a.tz-a.z, d=Math.hypot(dx,dz);
    if(d>1){
      a.x += dx/d*a.speed*dt; a.z += dz/d*a.speed*dt;
      a.mesh.rotation.y = Math.atan2(dx,dz);
      a.mesh.position.y = Math.abs(Math.sin(t*6))*0.15;
    }
    a.mesh.position.x=a.x; a.mesh.position.z=a.z;
  });

  /* 자동차 */
  cars.forEach(c=>{
    c.t += c.dir*c.speed*dt;
    if(c.t>140) c.t=-140; if(c.t<-140) c.t=140;
    if(c.axis==='x') c.g.position.set(c.t, 0, c.line);
    else c.g.position.set(c.line, 0, c.t);
  });

  /* 드론 */
  drones.forEach(d=>{
    d.a += d.sp*dt;
    d.g.position.set(d.cx+Math.cos(d.a)*d.r, d.h+Math.sin(t*2+d.a)*1.5, d.cz+Math.sin(d.a)*d.r);
    d.g.rotation.y = -d.a;
  });

  /* 풍차 */
  spinners.forEach(sp=>{ sp.rotation.z += dt*(1+state.wind*6); });

  /* 굴뚝 연기 */
  if(smokeStacks.length){
    smokeSprites.forEach((s,i)=>{
      const stack = smokeStacks[i % smokeStacks.length];
      s.t += dt*0.35;
      if(s.t>1) s.t=0;
      const wp = new THREE.Vector3(stack.ox, 10.5, stack.oz);
      stack.parent.localToWorld(wp);
      s.sp.visible = true;
      s.sp.position.set(wp.x + s.t*8*(0.3+state.wind*2), wp.y + s.t*16, wp.z + Math.sin(s.t*9+i)*1.5);
      s.sp.material.opacity = 0.5*(1-s.t);
      s.sp.scale.setScalar(2.5+s.t*7);
    });
  } else smokeSprites.forEach(s=>{ s.sp.visible=false; });

  /* 운석 */
  if(meteor){
    meteor.t += dt;
    const f = meteor.t/2.2;
    meteor.mesh.position.lerpVectors(new THREE.Vector3(250,400,-220), new THREE.Vector3(0,4,0), Math.min(1,f));
    meteor.mesh.scale.setScalar(1+f*0.5);
    if(f>=1){
      worldRoot.remove(meteor.mesh); meteor=null;
      const flash = document.getElementById('flash');
      flash.style.transition='none'; flash.style.opacity=0.9;
      setTimeout(()=>{ flash.style.transition='opacity 1.2s'; flash.style.opacity=0; },60);
      noiseSound(2, 150, 0.5);
      state.quakeT = Math.max(state.quakeT, 2);
    }
  }

  /* 로켓 발사 */
  if(state.launching){
    state.launchT += dt;
    const lt = state.launchT;
    if(lt>1.5){
      rocket.position.y = Math.pow(lt-1.5, 2.2)*14;
      const flame = rocket.getObjectByName('flame');
      flame.scale.y = 1+Math.random()*0.6;
      shakeX += (Math.random()-0.5)*0.4; shakeY += (Math.random()-0.5)*0.4;
      // 카메라가 로켓 따라감
      const wp = new THREE.Vector3(); rocket.getWorldPosition(wp);
      cam.target.lerp(new THREE.Vector3(wp.x, wp.y+8, wp.z), Math.min(1, dt*3));
      cam.dist = Math.max(40, cam.dist - dt*60);
      if(rocket.position.y>260){
        // 대기권 돌파 → 우주에서 달까지 비행
        state.launching = false;
        rocket.position.y = 0; rocket.getObjectByName('flame').visible = false;
        enterSpace(earthSphere);
        state.flight = {t:0, dur:8};
        shipMesh.visible = true;
        cam.dist = 34; cam.phi = 0.25;
        banner('🚀 지구를 떠나 달을 향해 비행 중...');
      }
    }
  }

  /* 우주 — 행성 공전, 로켓 비행, 뷰 전환 */
  if(state.view==='space' || state.flight){
    planetMeshes.forEach(p=>{
      if(p.def.orbit>0){
        p.angle += p.def.speed*dt*0.25;
        p.mesh.position.set(Math.cos(p.angle)*p.def.orbit, 0, Math.sin(p.angle)*p.def.orbit);
      }
      p.mesh.rotation.y += dt*0.05;
    });
    if(earthSphere && moonSphere){
      moonOrbitA += dt*0.1;
      moonSphere.position.set(
        earthSphere.position.x + Math.cos(moonOrbitA)*14,
        0, earthSphere.position.z + Math.sin(moonOrbitA)*14);
      moonSphere.rotation.y += dt*0.03;
      if(cloudSphere) cloudSphere.rotation.y += dt*0.02;
    }
    if(state.flight){
      const f = state.flight; f.t += dt;
      const k = Math.min(1, f.t/f.dur);
      const kk = k*k*(3-2*k);
      const start = earthSphere.position.clone().add(new THREE.Vector3(0, PLANETS[3].r+2, 0));
      const end = moonSphere.position.clone();
      const pos = start.clone().lerp(end, kk);
      pos.y += Math.sin(k*Math.PI)*22;
      const dir = pos.clone().sub(shipMesh.position).normalize();
      shipMesh.position.copy(pos);
      if(dir.lengthSq()>0.001) shipMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
      cam.target.lerp(pos, Math.min(1, dt*4));
      cam.dist += (26-cam.dist)*Math.min(1,dt*2);
      if(k>=1) travel(true);
    } else if(state.view==='space' && focusBody){
      const wp = new THREE.Vector3(); focusBody.getWorldPosition(wp);
      cam.target.lerp(wp, Math.min(1, dt*6));
      const def = focusBody.userData.planet;
      if(focusBody.userData.isEarth){
        cam.minDist = 3;
        if(cam.dist < 10.5) enterSurface();
      } else if(focusBody.userData.isMoon){
        cam.minDist = 2.6;
        if(cam.dist < 3.4) travel(true);
      } else {
        cam.minDist = Math.max(3, (def?.r||4)*1.6);
      }
      if(cam.dist > 1350) enterGalaxy();
    }
  }
  if(state.view==='galaxy'){
    galaxyRoot.rotation.y += dt*0.008;
    if(cam.dist < 95){ enterSpace(earthSphere); cam.dist = 1200; }
  }
  if(state.view==='surface' && !state.launching && cam.dist >= 755){
    enterSpace(earthSphere); cam.dist = 42;
  }
  if(state.view==='moon' && cam.dist >= 66){
    enterSpace(moonSphere); cam.dist = 9;
  }

  /* 파괴 잔해 물리 */
  for(let i=debris.length-1;i>=0;i--){
    const d = debris[i];
    d.life -= dt;
    d.vy -= dt*30;
    d.m.position.x += d.vx*dt; d.m.position.y += d.vy*dt; d.m.position.z += d.vz*dt;
    if(d.m.position.y < 0.2){ d.m.position.y = 0.2; d.vy = Math.abs(d.vy)*0.3; d.vx*=0.7; d.vz*=0.7; }
    d.m.rotation.x += d.rx*dt; d.m.rotation.z += d.rz*dt;
    if(d.life<0.5) d.m.scale.setScalar(Math.max(0.01, d.life*2));
    if(d.life<=0){ worldRoot.remove(d.m); d.m.geometry.dispose(); d.m.material.dispose(); debris.splice(i,1); }
  }

  /* 달 위 우주인 */
  if(state.onMoon){
    const sp = 8;
    let mx=0, mz=0;
    if(keys['w']||keys['arrowup']) mz-=1;
    if(keys['s']||keys['arrowdown']) mz+=1;
    if(keys['a']||keys['arrowleft']) mx+=1;
    if(keys['d']||keys['arrowright']) mx-=1;
    if(mx||mz){
      const st=Math.sin(cam.theta), ct=Math.cos(cam.theta);
      const wx = mx*ct - mz*st, wz = -mx*st - mz*ct;
      const len = Math.hypot(wx,wz)||1;
      astronaut.position.x += wx/len*sp*dt*-1;
      astronaut.position.z += wz/len*sp*dt*-1;
      astronaut.rotation.y = Math.atan2(-wx,-wz);
      moonState.hop += dt*7;
      astronaut.position.y = Math.abs(Math.sin(moonState.hop))*0.9; // 낮은 중력 껑충
    } else {
      astronaut.position.y = Math.max(0, astronaut.position.y - dt*2);
    }
    astronaut.position.x = Math.max(-380, Math.min(380, astronaut.position.x));
    astronaut.position.z = Math.max(-380, Math.min(380, astronaut.position.z));
    cam.target.lerp(new THREE.Vector3(astronaut.position.x, 1, astronaut.position.z), Math.min(1,dt*4));
    const fl = moonRoot.getObjectByName('moonFlag');
    if(fl) fl.rotation.y = Math.sin(t*1.2)*0.15;
  } else {
    /* 지구 위 키보드 이동 */
    const kSp = cam.dist*0.55;
    if(keys['w']||keys['arrowup']){ cam.target.x -= Math.sin(cam.theta)*kSp*dt; cam.target.z -= Math.cos(cam.theta)*kSp*dt; }
    if(keys['s']||keys['arrowdown']){ cam.target.x += Math.sin(cam.theta)*kSp*dt; cam.target.z += Math.cos(cam.theta)*kSp*dt; }
    if(keys['a']||keys['arrowleft']){ cam.target.x += Math.cos(cam.theta)*kSp*dt; cam.target.z -= Math.sin(cam.theta)*kSp*dt; }
    if(keys['d']||keys['arrowright']){ cam.target.x -= Math.cos(cam.theta)*kSp*dt; cam.target.z += Math.sin(cam.theta)*kSp*dt; }
  }

  /* 시계 UI */
  const dtH = dayTime();
  document.getElementById('clockLine').textContent =
    `${SEASONS[seasonIdx()]} · ${timeLabel()} ${String(Math.floor(dtH)).padStart(2,'0')}:${String(Math.floor((dtH%1)*60)).padStart(2,'0')}`;

  /* 물결 애니메이션 */
  if(riverWater && riverWater.visible) riverWater.material.uniforms.time.value += dt*0.7;

  applyCamera();
  camera.position.x += shakeX; camera.position.y += Math.abs(shakeY)*0.5; camera.position.z += shakeY;

  composer.render();
}

buildCity(0);
applySeasonColors();
applyCamera();
setSpeed(1);
banner('🦕 공룡시대 — 휠로 확대/축소, 휠 누르고 드래그로 각도를 바꿔보세요!', 6000);
animate();
</script>
</body>
</html>
